<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章标题 — 常沙的主页</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  /* 文章内容排版 */
  .article {
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 24px 60px;
  }
  .article h1 {
    font-size: 2rem;
    color: var(--brown);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .article .meta {
    color: var(--brown-lighter);
    font-size: 0.88rem;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .article .meta .blog-tag {
    font-size: 0.73rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .article .content {
    font-size: 1rem;
    color: var(--brown-light);
    line-height: 2;
  }
  .article .content h2 {
    font-size: 1.35rem;
    color: var(--brown);
    margin: 36px 0 14px;
  }
  .article .content h3 {
    font-size: 1.1rem;
    color: var(--brown);
    margin: 28px 0 10px;
  }
  .article .content p {
    margin-bottom: 16px;
  }
  .article .content code {
    background: var(--warm-white);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.9em;
    color: var(--coral);
  }
  .article .content pre {
    background: #2d2a27;
    color: #f5e6d3;
    padding: 20px 24px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin-bottom: 20px;
    line-height: 1.6;
    font-size: 0.88rem;
  }
  .article .content pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  .article .content blockquote {
    border-left: 3px solid var(--coral-light);
    padding: 8px 18px;
    margin: 20px 0;
    color: var(--brown-lighter);
    background: var(--coral-pale);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  .article .content ul, .article .content ol {
    margin-bottom: 16px;
    padding-left: 24px;
  }
  .article .content li {
    margin-bottom: 6px;
  }
  .article .content img {
    max-width: 100%;
    border-radius: var(--radius-sm);
    margin: 16px 0;
  }
  .back-home {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--brown-lighter);
    text-decoration: none;
    font-size: 0.9rem;
    margin-bottom: 40px;
    transition: color 0.2s;
  }
  .back-home:hover { color: var(--coral); }

  @media (max-width: 768px) {
    .article { padding: 80px 20px 40px; }
    .article h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<canvas id="sakura-canvas"></canvas>

<article class="article">
  <a href="../index.html" class="back-home">← 返回主页</a>
  <h1>文章标题</h1>
  <div class="meta">
    <span>📅 2026-05-20</span>
    <span class="blog-tag frontend">前端</span>
    <span class="blog-tag tutorial">教程</span>
  </div>
  <div class="content">

    <p>在这里写你的文章内容……</p>

    <h2>二级标题</h2>
    <p>正文段落。你可以用 <code>行内代码</code> 来标注技术名词。</p>

    <pre><code>// 代码块示例
function hello() {
  console.log("Hello, World!");
}</code></pre>

    <blockquote>这是一段引用文字，用来强调某个观点或引用外部资料。</blockquote>

    <h3>三级标题</h3>
    <ul>
      <li>无序列表项一</li>
      <li>无序列表项二</li>
    </ul>

    <ol>
      <li>有序列表项一</li>
      <li>有序列表项二</li>
    </ol>

    <h2>总结</h2>
    <p>文章结尾，总结核心内容。</p>

  </div>
</article>

<script src="../js/sakura.js"></script>
</body>
</html>
