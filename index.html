<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Frutiger Aero | 个人空间</title>
    <!-- 引入 Font Awesome 6 (免费图标库，用于社交和装饰) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 Google Fonts 干净现代的无衬线字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #c3e9f5 0%, #b0dcf0 30%, #8fcbe7 70%, #a2dfcd 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: #1a3c40;
            line-height: 1.4;
            /* 添加细微的噪点纹理增强复古质感 */
            background-image: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,240,0.05) 0px, rgba(255,255,240,0.05) 2px, transparent 2px, transparent 4px);
        }

        /* ---------- 漂浮装饰元素 (气泡 / 光点 / 绿叶) ---------- */
        .floating-element {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            filter: blur(0.6px);
        }

        .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,245,0.7), rgba(210,245,255,0.4));
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.02), inset 2px 2px 10px rgba(255,255,255,0.8), 0 8px 20px rgba(0,0,0,0.05);
            backdrop-filter: blur(1px);
            animation: floatUp 8s infinite ease-in-out;
        }

        .leaf {
            color: rgba(80, 140, 100, 0.4);
            font-size: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
            animation: swayLeaf 14s infinite alternate ease-in-out;
        }

        .water-drop {
            background: rgba(220, 248, 255, 0.5);
            border-radius: 60% 40% 50% 50%;
            box-shadow: inset 2px 2px 6px rgba(255,255,245,0.8), 2px 3px 8px rgba(0,0,0,0.05);
            animation: dropFloat 12s infinite alternate;
        }

        /* 动画定义 */
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-30px) translateX(10px) scale(1.05);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-60px) translateX(-5px) scale(0.95);
                opacity: 0.2;
            }
        }

        @keyframes swayLeaf {
            0% {
                transform: translateY(0px) rotate(0deg);
            }
            100% {
                transform: translateY(-20px) rotate(8deg);
            }
        }

        @keyframes dropFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.35;
            }
            100% {
                transform: translateY(-40px) scale(1.2);
                opacity: 0.1;
            }
        }

        /* 背景波浪 SVG (底部) */
        .wave-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* 玻璃质感卡片 - Frutiger Aero 核心 */
        .glass-card {
            max-width: 860px;
            width: 100%;
            background: rgba(240, 255, 250, 0.45);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 30, 30, 0.2), inset 0 1px 2px rgba(255,255,245,0.9), inset 0 -1px 1px rgba(0,0,0,0.02);
            border: 1px solid rgba(255, 255, 245, 0.7);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            padding: 2rem 2rem 2.5rem;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 32px 55px rgba(0, 40, 40, 0.25), inset 0 1px 2px rgba(255,255,250,0.95);
        }

        /* 顶部高光装饰 (仿玻璃反射) */
        .card-gloss {
            position: relative;
            overflow: hidden;
            border-radius: 48px;
        }
        
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -30%;
            width: 120%;
            height: 100%;
            background: linear-gradient(115deg, rgba(255,255,245,0) 10%, rgba(255,255,250,0.4) 40%, rgba(255,255,255,0.5) 60%, rgba(255,255,245,0) 90%);
            transform: skewX(-15deg) translateX(-100%);
            pointer-events: none;
            transition: transform 0.6s ease;
            border-radius: 48px;
        }

        .glass-card:hover::before {
            transform: skewX(-15deg) translateX(85%);
        }

        /* 头像区域 */
        .avatar-section {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            background: linear-gradient(135deg, #e0fff0, #bfe9f5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(0, 30, 25, 0.2), inset 0 2px 3px rgba(255,255,245,0.9), inset 0 -2px 3px rgba(0,0,0,0.03);
            border: 2px solid rgba(255,255,240,0.8);
            transition: all 0.3s;
        }

        .avatar-circle i {
            font-size: 4.5rem;
            color: #2f7d6b;
            text-shadow: 2px 2px 5px rgba(120,180,150,0.3);
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        .avatar-circle:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 28px rgba(0, 40, 30, 0.25);
        }

        /* 文本内容 */
        .name {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(125deg, #1b5e55, #267c6e, #3f9480);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 8px rgba(120,160,130,0.2);
            margin: 0.5rem 0 0.25rem;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 500;
            color: #236b5c;
            background: rgba(220, 250, 240, 0.65);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            margin-bottom: 1rem;
            box-shadow: inset 0 1px 2px rgba(255,255,245,0.8), 0 2px 6px rgba(0,0,0,0.05);
        }

        .bio {
            font-size: 1.05rem;
            color: #1e4e48;
            max-width: 560px;
            margin: 1rem auto 0;
            padding: 0 0.5rem;
            font-weight: 400;
            background: rgba(250, 255, 245, 0.3);
            border-radius: 32px;
            backdrop-filter: blur(2px);
            line-height: 1.5;
        }

        /* 装饰分隔线 */
        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #80cfbc, #b2ebdf, #4fae96);
            margin: 1.8rem auto 1.8rem;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(255,255,210,0.5);
        }

        /* 信息网格区 (兴趣/小栏) */
        .info-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.8rem;
            margin: 2rem 0 1.8rem;
        }

        .info-item {
            background: rgba(245, 255, 250, 0.5);
            backdrop-filter: blur(5px);
            padding: 0.8rem 1.3rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: #1b5e54;
            border: 1px solid rgba(255,255,240,0.7);
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .info-item i {
            font-size: 1.4rem;
            color: #399f88;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }

        .info-item span {
            font-size: 0.95rem;
        }

        .info-item:hover {
            background: rgba(255, 255, 250, 0.8);
            transform: translateY(-3px);
            border-color: rgba(120,210,180,0.6);
        }

        /* 社交链接 - 高光按钮风格 */
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin: 2rem 0 1rem;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(235, 252, 245, 0.65);
            backdrop-filter: blur(8px);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1rem;
            color: #1d6a5c;
            text-decoration: none;
            border: 1px solid rgba(255,255,240,0.85);
            box-shadow: 0 5px 12px rgba(0, 20, 10, 0.1), inset 0 1px 1px rgba(255,255,250,0.9);
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
        }

        .social-btn i {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .social-btn:hover {
            background: rgba(255, 255, 250, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 30, 20, 0.15);
            color: #0f554a;
            border-color: #a0e0ce;
        }

        .social-btn:hover i {
            transform: scale(1.1);
        }

        /* 实时时间模块 (科技感小点缀) */
        .time-card {
            background: rgba(210, 240, 230, 0.5);
            border-radius: 48px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 0.5rem 1.3rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,250,215,0.7);
            color: #2c7a6b;
        }

        .time-card i {
            font-size: 1.1rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 2.2rem;
            font-size: 0.75rem;
            color: #2e6d60;
            opacity: 0.8;
            letter-spacing: 0.4px;
        }

        /* 响应式调整 */
        @media (max-width: 620px) {
            .glass-card {
                padding: 1.5rem;
            }
            .name {
                font-size: 2rem;
            }
            .avatar-circle {
                width: 90px;
                height: 90px;
            }
            .avatar-circle i {
                font-size: 3.2rem;
            }
            .info-item {
                padding: 0.5rem 1rem;
            }
            .social-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.85rem;
            }
            .bio {
                font-size: 0.9rem;
            }
        }

        /* 水润光标效果 */
        ::selection {
            background: #6bc1ae;
            color: #f6fffa;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 10px;
            background: #cae7df;
        }
        ::-webkit-scrollbar-thumb {
            background: #479e88;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 漂浮自然元素: 气泡、绿叶、水珠 -->
<div class="floating-element bubble" style="width: 65px; height: 65px; bottom: 12%; left: 5%; animation-duration: 11s;"></div>
<div class="floating-element bubble" style="width: 40px; height: 40px; top: 18%; right: 7%; animation-duration: 13s; animation-delay: -2s;"></div>
<div class="floating-element bubble" style="width: 90px; height: 90px; top: 60%; right: 12%; opacity: 0.3; animation-duration: 15s; animation-delay: -5s;"></div>
<div class="floating-element leaf" style="top: 12%; left: 8%; font-size: 2.2rem;"><i class="fas fa-leaf"></i></div>
<div class="floating-element leaf" style="bottom: 18%; right: 3%; font-size: 2.5rem; animation-duration: 18s; transform: rotate(15deg);"><i class="fas fa-seedling"></i></div>
<div class="floating-element water-drop" style="width: 25px; height: 32px; top: 28%; left: 85%; animation-duration: 9s;"></div>
<div class="floating-element water-drop" style="width: 18px; height: 24px; bottom: 22%; left: 15%; animation-duration: 14s;"></div>

<!-- 底部波浪装饰 (SVG) -->
<div class="wave-bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 180" preserveAspectRatio="none">
        <path fill="#b5e2d4" fill-opacity="0.3" d="M0,96L48,112C96,128,192,160,288,154.7C384,149,480,107,576,96C672,85,768,107,864,117.3C960,128,1056,128,1152,112C1248,96,1344,64,1392,48L1440,32L1440,180L1392,180C1344,180,1248,180,1152,180C1056,180,960,180,864,180C768,180,672,180,576,180C480,180,384,180,288,180C192,180,96,180,48,180L0,180Z"></path>
        <path fill="#9fd0c0" fill-opacity="0.2" d="M0,128L48,144C96,160,192,192,288,186.7C384,181,480,139,576,122.7C672,107,768,117,864,128C960,139,1056,149,1152,144C1248,139,1344,117,1392,106.7L1440,96L1440,180L1392,180C1344,180,1248,180,1152,180C1056,180,960,180,864,180C768,180,672,180,576,180C480,180,384,180,288,180C192,180,96,180,48,180L0,180Z"></path>
    </svg>
</div>

<main class="container">
    <div class="glass-card card-gloss">
        <!-- 头像区 -->
        <div class="avatar-section">
            <div class="avatar-circle">
                <i class="fas fa-droplet"></i>  <!-- 水珠图标代表清新自然 -->
            </div>
            <h1 class="name">林清野</h1>
            <div class="title">
                <i class="fas fa-feather-alt" style="margin-right: 6px;"></i> 数字体验设计师 · 自然像素玩家
            </div>
            <div class="bio">
                捕捉光与水之间的微光，重构灵动界面。 怀旧未来主义，Frutiger Aero 美学传承者。
            </div>
        </div>

        <div class="divider"></div>

        <!-- 个性标签/亮点 模仿玻璃质感信息栏 -->
        <div class="info-grid">
            <div class="info-item">
                <i class="fas fa-tree"></i>
                <span>生态交互设计</span>
            </div>
            <div class="info-item">
                <i class="fas fa-water"></i>
                <span>动态流体灵感</span>
            </div>
            <div class="info-item">
                <i class="fas fa-cloud-sun"></i>
                <span>光感UI实验室</span>
            </div>
            <div class="info-item">
                <i class="fas fa-microchip"></i>
                <span>复古未来科技</span>
            </div>
        </div>

        <!-- 简短介绍: 更饱满的 frutiger aero 理念 -->
        <div style="text-align: center; margin: 0.2rem 0 0.5rem;">
            <span style="background: rgba(220,245,235,0.6); padding: 0.3rem 1rem; border-radius: 60px; font-size: 0.85rem; font-weight: 500; color: #2f7d6b;"><i class="fas fa-sun"></i> 玻璃质感 · 明亮光辉 · 自然共生</span>
        </div>

        <!-- 社交链接 (透明高光按钮) -->
        <div class="social-links">
            <a href="#" class="social-btn" aria-label="GitHub">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="#" class="social-btn" aria-label="Twitter / X">
                <i class="fab fa-twitter"></i> 灵感笔记
            </a>
            <a href="#" class="social-btn" aria-label="Instagram">
                <i class="fab fa-instagram"></i> 光影瞬间
            </a>
            <a href="#" class="social-btn" aria-label="Dribbble">
                <i class="fab fa-dribbble"></i> 设计库
            </a>
            <a href="#" class="social-btn" aria-label="邮箱">
                <i class="fas fa-envelope"></i> 联络
            </a>
        </div>

        <!-- 装饰性实时时钟 + 小细节 -->
        <div style="display: flex; justify-content: center; margin-top: 1rem;">
            <div class="time-card" id="liveClock">
                <i class="far fa-clock"></i>
                <span id="clockText">加载时间...</span>
                <i class="fas fa-globe" style="margin-left: 6px;"></i>
            </div>
        </div>

        <!-- 另一句俏皮语录: Frutiger Aero 怀旧语录 -->
        <div class="footer-note">
            ✦ 水光潋滟，呼吸感永续 ✦ <br>
            Frutiger Aero · 玻璃与叶脉的交响
        </div>
    </div>
</main>

<script>
    // 实现动态时间显示，与风格轻盈配合
    function updateClock() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const dateString = `${year}.${month}.${day}`;
        const timeString = `${hours}:${minutes}:${seconds}`;
        const clockElement = document.getElementById('clockText');
        if (clockElement) {
            clockElement.innerHTML = `${dateString}  ${timeString}`;
        }
    }
    updateClock();
    setInterval(updateClock, 1000);

    // 增加一点平滑的鼠标跟随微光 (可选，仅仅提升感官)
    // 创建一个小光晕跟随鼠标? 为了不过度复杂，但可添加细微的光影移动效果在卡片上 (可不加)
    // 额外: 给body一个柔和的鼠标跟随光晕? 保持轻盈风格，不侵入核心体验
    // 为了更贴合 Frutiger Aero 那种灵动感，加一点点鼠标移动时卡片反光角度变化 (轻交互)
    const card = document.querySelector('.glass-card');
    if(card) {
        document.body.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const rotateX = (y - 0.5) * 2;
            const rotateY = (x - 0.5) * 2;
            // 微小3d倾斜，注意不能太夸张影响阅读，轻微移动更生动
            card.style.transform = `perspective(1200px) rotateX(${rotateX * 0.5}deg) rotateY(${rotateY * 0.5}deg) translateY(-3px)`;
            // 添加过渡平滑效果
            card.style.transition = 'transform 0.15s ease-out';
        });
        document.body.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg) translateY(0px)';
            setTimeout(() => {
                if(card) card.style.transition = 'transform 0.3s ease, box-shadow 0.4s ease';
            }, 100);
        });
    }

    // 随机气泡/叶子生成更多动态? 已存在静态漂浮感足够，无需复杂
    // 防止滚动时 wave 影响点击
    console.log("Frutiger Aero 个人主页 · 清新荡漾");
</script>

</body>
</html>
